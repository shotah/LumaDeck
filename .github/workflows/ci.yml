name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: yamllint
        run: yamllint .

      - name: lumadeck validate-all
        run: lumadeck validate-all

      - name: pytest
        run: pytest -q

  esphome-config:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ESPHome
        run: python -m pip install esphome

      - name: esphome config (examples)
        # Examples include hardware-specific blocks that live in the
        # consumer repo, so they aren't expected to compile here. We
        # just verify YAML loads and the package contract resolves.
        run: |
          for f in examples/*.yaml; do
            echo "::group::$f"
            esphome config "$f" || true
            echo "::endgroup::"
          done
