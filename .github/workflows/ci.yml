name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: yamllint
        run: yamllint .

      - name: lumadeck validate-all
        run: lumadeck validate-all

      - name: pytest
        run: pytest -q

  esphome-config:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ESPHome
        run: python -m pip install esphome

      - name: esphome config (device examples)
        # tools/verify_examples.py bootstraps placeholder secrets and
        # only runs `esphome config` against examples that define a
        # top-level `display:` block. Package-preview examples are
        # skipped (they need consumer-supplied driver blocks to
        # actually compile).
        run: python tools/verify_examples.py
