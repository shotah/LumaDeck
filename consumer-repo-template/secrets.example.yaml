# Copy this file to secrets.yaml and fill in real values.
# secrets.yaml is gitignored and must NEVER be committed.

wifi_ssid:     "your-wifi-network"
wifi_password: "your-wifi-password"

# Optional: pre-shared key for the ESPHome native API. Leave unset to
# generate one and read it from the device on first boot.
# api_key: "base64-encoded-key-here"

# Optional: OTA update password.
# ota_password: "something-strong"
