# ---------------------------------------------------------------
# secrets.example.yaml
#
# This file is checked in. It provides placeholder values so
# `esphome config examples/<file>.yaml` (and `make verify`) can
# resolve `!secret wifi_ssid` / `!secret wifi_password` without
# anyone needing to edit real credentials.
#
# `make verify` will copy this file to `examples/secrets.yaml` if
# that file is missing. `examples/secrets.yaml` is gitignored — it
# must NEVER be committed.
#
# These placeholders are NOT valid for actually flashing hardware.
# For real builds, copy this template into your consumer repo (next
# to your device YAML) and fill in your real credentials there.
# See docs/consumer-repo-guide.md.
# ---------------------------------------------------------------

wifi_ssid:     "lumadeck-verify-placeholder"
wifi_password: "lumadeck-verify-placeholder"
