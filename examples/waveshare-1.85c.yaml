# Bind the display to LVGL. The 360x360 panel is square so no
# rotation is needed (round_360 layout assumes this orientation).
lvgl:
  displays:
    - lum_display

touchscreen:
  - platform: cst816
    id: lum_touchscreen
    i2c_id: bus_a
    interrupt_pin: GPIO4
    # TP_RST is also on the TCA9554 (EXIO1).
    reset_pin:
      pca9554: lum_io_expander
      number: 1
      mode:
        output: true
      inverted: true
    on_touch:
      - script.execute:
          id: lum_touch_press
          x: !lambda 'return touch.x;'
          y: !lambda 'return touch.y;'
    on_update:
      - if:
          condition:
            lambda: 'return !touches.empty();'
          then:
            - script.execute:
                id: lum_touch_update
                x: !lambda 'return touches[0].x;'
                y: !lambda 'return touches[0].y;'
    on_release:
      - script.execute: lum_touch_release

# Boot button doubles as manual page-cycle, matching the LilyGo build.
binary_sensor:
  - platform: gpio
    id: lum_boot_btn
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - script.execute: nav_next_page

# I2S audio bus (PCM5101 DAC). The `speaker:` sink is supplied by
# packages/audio.yaml; we just declare the bus + pins here.
i2s_audio:
  - id: lum_i2s
    i2s_lrclk_pin: GPIO38
    i2s_bclk_pin: GPIO48
