# ---------------------------------------------------------------
# example: waveshare-1.85c
# Reference build for the Waveshare ESP32-S3-Touch-LCD-1.85C BOX
# variant (3.7V Li battery + 4Ω 5W speaker).
#
#   Product: https://www.waveshare.com/esp32-s3-touch-lcd-1.85c.htm
#   Wiki:    https://www.waveshare.com/wiki/ESP32-S3-Touch-LCD-1.85C
#
# Hardware highlights:
#   * 1.85" 360x360 round AMOLED, ST77916 over QSPI
#   * CST816 capacitive touch over I2C
#   * TCA9554PWR I2C GPIO expander (LCD_RST=EXIO2, TP_RST=EXIO1) —
#     see docs/displays-with-io-expander-reset.md
#   * PCM5101 I2S DAC + 4Ω 5W speaker (BOX variant)
#   * PCF85063 RTC, QMI8658 IMU, microphone, TF slot (not wired)
#
# STATUS — passes `esphome config` against ESPHome 2026.04. NOT yet
# bring-up tested on real hardware. First-light may require flipping
# `color_order:` (rgb/bgr) and/or `invert_colors:`. The ST77916 init
# sequence will become obsolete the moment ESPHome ships a built-in
# `model: ST77916` for `qspi_dbi`; track
# https://github.com/esphome/feature-requests/issues/2803.
#
# Init sequence transcribed verbatim from Espressif's reference:
#   github.com/esp-arduino-libs/ESP32_Display_Panel
#     /blob/master/src/drivers/lcd/port/esp_lcd_st77916.c
#   :: vendor_specific_init_default[]
# ---------------------------------------------------------------

substitutions:
  device_name:      "waveshare_round"
  device_friendly:  "Waveshare 1.85 Round"
  ha_media_player:  "media_player.living_room"
  # Pin substitutions consumed by packages/backlight.yaml +
  # packages/audio.yaml.
  backlight_pin:    "GPIO5"
  audio_dout_pin:   "GPIO47"

packages:
  core:      !include ../packages/core.yaml
  board:     !include ../packages/board_esp32s3.yaml
  theme:     !include ../themes/dark.yaml
  fonts:     !include ../packages/fonts.yaml
  colors:    !include ../packages/colors.yaml
  display:   !include ../packages/display.yaml
  ha:        !include ../packages/ha.yaml
  nav:       !include ../packages/nav.yaml
  touch:     !include ../packages/touch.yaml
  backlight: !include ../packages/backlight.yaml
  audio:     !include ../packages/audio.yaml
  layout:    !include ../layouts/round_360.yaml
  status:    !include ../widgets/status_bar.yaml
  clock:     !include ../widgets/clock.yaml
  navtabs:   !include ../widgets/nav_tabs.yaml
  media:     !include ../widgets/media_card.yaml
  toast:     !include ../widgets/notification_toast.yaml
  chime:     !include ../widgets/notification_sound.yaml

# ---- hardware (lives in the consumer repo, not in LumaDeck) ----

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
  variant: ESP32S3

# The Waveshare 1.85C wires its USB-C port directly to the ESP32-S3's
# built-in USB-Serial/JTAG peripheral (GPIO19/20) — there's NO
# CH340/CP2102 bridge. Default ESPHome logging targets UART0
# (GPIO43/44, side header only), which means nothing reaches the
# USB-C cable. Override the logger to route over the JTAG/CDC device.
logger:
  hardware_uart: USB_SERIAL_JTAG
  level: ${log_level}

# 8MB octal PSRAM — required for the 360x360 LVGL framebuffer.
psram:
  mode: octal
  speed: 80MHz

# Single I2C bus shared by the TCA9554 expander, CST816 touch,
# PCF85063 RTC, and any future expander-side peripherals.
i2c:
  - id: bus_a
    sda: GPIO11
    scl: GPIO10
    frequency: 400kHz
    scan: true

# TCA9554PWR GPIO expander. Drives panel reset (EXIO2) and touch
# reset (EXIO1). See docs/displays-with-io-expander-reset.md for
# why this is `pca9554:` even though the chip is a TCA9554.
pca9554:
  - id: lum_io_expander
    address: 0x20
    i2c_id: bus_a

# QSPI bus for the ST77916 AMOLED.
spi:
  - id: lcd_qspi
    type: quad
    clk_pin: GPIO40
    data_pins:
      - GPIO46    # D0 / SDA0
      - GPIO45    # D1 / SDA1
      - GPIO42    # D2 / SDA2
      - GPIO41    # D3 / SDA3

display:
  - platform: qspi_dbi
    id: lum_display
    model: CUSTOM
    spi_id: lcd_qspi
    cs_pin: GPIO21
    # LCD_RST is on EXIO2 of the TCA9554, not a real GPIO.
    reset_pin:
      pca9554: lum_io_expander
      number: 2
      mode:
        output: true
      inverted: true
    dimensions:
      width: 360
      height: 360
    color_order: bgr
    invert_colors: false
    auto_clear_enabled: false
    update_interval: never
    # Vendor-specific init sequence for ST77916 — transcribed from
    # esp_lcd_st77916.c::vendor_specific_init_default[]. Each
    # `- [CMD, ...DATA]` corresponds to one `tx_param()`; non-zero
    # `delay_ms` entries become a `- delay <n>ms` line directly
    # after the command, matching the C driver's vTaskDelay().
    init_sequence:
      - [0xF0, 0x08]
      - [0xF2, 0x08]
      - [0x9B, 0x51]
      - [0x86, 0x53]
      - [0xF2, 0x80]
