# ---------------------------------------------------------------
# layout: _template
# Copy to layouts/<shape>_<dim>.yaml. Set the substitutions to match
# the screen geometry. Define `home_page` (and optionally other pages
# from docs/layout-contract.md) with named region anchors so widgets
# can position themselves without hard-coded x/y.
# ---------------------------------------------------------------

substitutions:
  screen_w:       "240"
  screen_h:       "240"
  screen_shape:   "square"   # round | square | wide | tall
  screen_radius:  "0"
  scale:          "1.0"

lvgl:
  pages:
    - id: home_page
      bg_color: ${bg}
      widgets:
        - obj:
            id: region_top
            align: TOP_MID
            width: ${screen_w}
            height: 1
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_center
            align: CENTER
            width: 1
            height: 1
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_bottom
            align: BOTTOM_MID
            width: ${screen_w}
            height: 1
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_left
            align: LEFT_MID
            width: 1
            height: ${screen_h}
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_right
            align: RIGHT_MID
            width: 1
            height: ${screen_h}
            bg_opa: TRANSP
            border_width: 0

    # All four extra pages MUST be declared so consumers can include
    # `packages/nav.yaml` (which references each by id) without a
    # config-time error. Trim only if you're sure you'll never use
    # `nav.yaml` with this layout.
    - id: media_page
      bg_color: ${bg}
    - id: lights_page
      bg_color: ${bg}
    - id: climate_page
      bg_color: ${bg}
    - id: settings_page
      bg_color: ${bg}
