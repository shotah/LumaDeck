# ---------------------------------------------------------------
# layout: round_240
# 240x240 circular display (smaller round panels).
# ---------------------------------------------------------------

substitutions:
  screen_w:       "240"
  screen_h:       "240"
  screen_shape:   "round"
  screen_radius:  "120"
  scale:          "0.75"

  safe_inset:     "34"

lvgl:
  pages:
    - id: home_page
      bg_color: ${bg}
      widgets:
        - obj:
            id: region_top
            align: TOP_MID
            y: ${safe_inset}
            width: 140
            height: 1
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_center
            align: CENTER
            width: 1
            height: 1
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_bottom
            align: BOTTOM_MID
            y: -${safe_inset}
            width: 140
            height: 1
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_left
            align: LEFT_MID
            x: ${safe_inset}
            width: 1
            height: 140
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_right
            align: RIGHT_MID
            x: -${safe_inset}
            width: 1
            height: 140
            bg_opa: TRANSP
            border_width: 0

    - id: media_page
      bg_color: ${bg}
    - id: lights_page
      bg_color: ${bg}
    - id: settings_page
      bg_color: ${bg}
