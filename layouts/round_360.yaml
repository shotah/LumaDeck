# ---------------------------------------------------------------
# layout: round_360
# 360x360 circular display (e.g. Waveshare 1.85" round).
# ---------------------------------------------------------------

substitutions:
  screen_w:       "360"
  screen_h:       "360"
  screen_shape:   "round"
  screen_radius:  "180"
  scale:          "1.0"

  # Inset for the "safe" rectangular region inside the circle.
  # 360 - (2 * 51) ~= 258, the inscribed-square edge.
  safe_inset:     "51"

lvgl:
  pages:
    - id: home_page
      bg_color: ${bg}
      widgets:
        - obj:
            id: region_top
            align: TOP_MID
            y: ${safe_inset}
            width: 200
            height: 1
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_center
            align: CENTER
            width: 1
            height: 1
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_bottom
            align: BOTTOM_MID
            y: -${safe_inset}
            width: 200
            height: 1
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_left
            align: LEFT_MID
            x: ${safe_inset}
            width: 1
            height: 200
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_right
            align: RIGHT_MID
            x: -${safe_inset}
            width: 1
            height: 200
            bg_opa: TRANSP
            border_width: 0

    - id: media_page
      bg_color: ${bg}
    - id: lights_page
      bg_color: ${bg}
    - id: climate_page
      bg_color: ${bg}
    - id: settings_page
      bg_color: ${bg}
