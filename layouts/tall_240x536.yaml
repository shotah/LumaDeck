# ---------------------------------------------------------------
# layout: tall_240x536
# 240 x 536 portrait display. Native orientation of the LilyGo
# T-Display-S3 AMOLED (1.91 inch, RM67162).
# ---------------------------------------------------------------

substitutions:
  screen_w:       "240"
  screen_h:       "536"
  screen_shape:   "tall"
  screen_radius:  "0"
  scale:          "1.0"

  # Same physical panel as wide_536x240; bump the theme defaults so
  # text is readable at arm's length on a 1.91-inch display. Override
  # per-device by setting these in the consumer YAML's top-level
  # substitutions block.
  font_size_xl:   "56"
  font_size_lg:   "36"
  font_size_md:   "24"
  font_size_sm:   "18"
  font_size_icon: "28"

lvgl:
  pages:
    - id: home_page
      bg_color: ${bg}
      widgets:
        - obj:
            id: region_top
            align: TOP_MID
            width: ${screen_w}
            height: 28
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_center
            align: CENTER
            width: 1
            height: 1
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_bottom
            align: BOTTOM_MID
            width: ${screen_w}
            height: 56
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_left
            align: LEFT_MID
            width: 1
            height: ${screen_h}
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_right
            align: RIGHT_MID
            width: 1
            height: ${screen_h}
            bg_opa: TRANSP
            border_width: 0

    - id: media_page
      bg_color: ${bg}
    - id: lights_page
      bg_color: ${bg}
    - id: climate_page
      bg_color: ${bg}
    - id: settings_page
      bg_color: ${bg}
