# ---------------------------------------------------------------
# layout: tall_240x536
# 240 x 536 portrait display. Native orientation of the LilyGo
# T-Display-S3 AMOLED (1.91 inch, RM67162).
# ---------------------------------------------------------------

substitutions:
  screen_w:       "240"
  screen_h:       "536"
  screen_shape:   "tall"
  screen_radius:  "0"
  scale:          "0.85"

lvgl:
  pages:
    - id: home_page
      bg_color: ${bg}
      widgets:
        - obj:
            id: region_top
            align: TOP_MID
            width: ${screen_w}
            height: 28
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_center
            align: CENTER
            width: 1
            height: 1
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_bottom
            align: BOTTOM_MID
            width: ${screen_w}
            height: 56
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_left
            align: LEFT_MID
            width: 1
            height: ${screen_h}
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_right
            align: RIGHT_MID
            width: 1
            height: ${screen_h}
            bg_opa: TRANSP
            border_width: 0

    - id: media_page
      bg_color: ${bg}
    - id: lights_page
      bg_color: ${bg}
    - id: climate_page
      bg_color: ${bg}
    - id: settings_page
      bg_color: ${bg}
