# ---------------------------------------------------------------
# layout: wide_536x240
# 536 x 240 landscape display. Same physical panel as
# layouts/tall_240x536.yaml (LilyGo T-Display-S3 AMOLED, 1.91"),
# but mounted / rotated 90 degrees. The consumer device YAML must
# set `rotation: 90` (or 270) on the display: block to match.
# ---------------------------------------------------------------

substitutions:
  screen_w:       "536"
  screen_h:       "240"
  screen_shape:   "wide"
  screen_radius:  "0"
  scale:          "1.0"

  # The 1.91" AMOLED has a high pixel density; the theme defaults are
  # physically tiny on this panel. Bump font sizes so text is readable
  # at arm's length. Override per-device by setting these in the
  # consumer YAML's top-level substitutions block.
  font_size_xl:   "56"
  font_size_lg:   "36"
  font_size_md:   "24"
  font_size_sm:   "18"
  font_size_icon: "28"

  # Widget size overrides for the 536 x 240 viewport. Default widget
  # sizes assume taller screens; here we trim heights and grow widths
  # to fit the landscape strip.
  status_w:        "480"
  nav_w:           "440"
  nav_h:           "44"
  media_w:         "500"
  media_h:         "200"   # default 250 doesn't fit 240-tall screens
  media_inner_w:   "460"
  thermo_w:        "420"
  thermo_h:        "200"   # default 220 doesn't fit
  icongrid_w:      "500"
  icongrid_h:      "180"
  weather_w:       "240"
  toast_w:         "440"
  toast_label_w:   "400"

lvgl:
  pages:
    - id: home_page
      bg_color: ${bg}
      widgets:
        - obj:
            id: region_top
            align: TOP_MID
            width: ${screen_w}
            height: 28
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_center
            align: CENTER
            width: 1
            height: 1
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_bottom
            align: BOTTOM_MID
            width: ${screen_w}
            height: 48
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_left
            align: LEFT_MID
            width: 1
            height: ${screen_h}
            bg_opa: TRANSP
            border_width: 0
        - obj:
            id: region_right
            align: RIGHT_MID
            width: 1
            height: ${screen_h}
            bg_opa: TRANSP
            border_width: 0

    - id: media_page
      bg_color: ${bg}
    - id: lights_page
      bg_color: ${bg}
    - id: climate_page
      bg_color: ${bg}
    - id: settings_page
      bg_color: ${bg}
