# ---------------------------------------------------------------
# package: core
# Hardware-agnostic ESPHome core. Consumer device YAML is expected to
# also include a board package (e.g. packages/board_esp32s3.yaml) and
# a display/touch driver definition specific to the device.
# ---------------------------------------------------------------

substitutions:
  device_name:        "lumadeck"
  device_friendly:    "LumaDeck"
  log_level:          "INFO"

esphome:
  name: ${device_name}
  friendly_name: ${device_friendly}
  min_version: "2024.6.0"
  name_add_mac_suffix: false

logger:
  level: ${log_level}

api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name}-fallback"

captive_portal:

time:
  - platform: homeassistant
    id: ha_time
