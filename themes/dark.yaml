# ---------------------------------------------------------------
# theme: dark
# Default theme. Pure black background, cool blue accent.
# ---------------------------------------------------------------

substitutions:
  bg:           "0x000000"
  bg_alt:       "0x141414"
  fg:           "0xFFFFFF"
  fg_muted:     "0x8A8A8A"
  accent:       "0x00D1FF"
  accent_alt:   "0x0EA5E9"
  success:      "0x22C55E"
  warn:         "0xF59E0B"
  error:        "0xEF4444"
  border:       "0x222222"

  font_family:    "Montserrat"
  font_size_xl:   "48"
  font_size_lg:   "28"
  font_size_md:   "18"
  font_size_sm:   "14"
  font_size_icon: "24"

  radius_sm:    "4"
  radius_md:    "12"
  radius_lg:    "24"
  radius_pill:  "999"
  pad_sm:       "4"
  pad_md:       "8"
  pad_lg:       "16"
  border_w:     "1"

  gradient_a:   "0x00D1FF"
  gradient_b:   "0x0EA5E9"
  shadow_color: "0x000000"
  shadow_op:    "96"
  anim_time:    "200"
