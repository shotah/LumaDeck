# ---------------------------------------------------------------
# theme: high_contrast
# Accessibility theme. Maximum contrast, large radii, thick borders.
# ---------------------------------------------------------------

substitutions:
  bg:           "0x000000"
  bg_alt:       "0x000000"
  fg:           "0xFFFFFF"
  fg_muted:     "0xFFFFFF"
  accent:       "0xFFFF00"
  accent_alt:   "0xFFFFFF"
  success:      "0x00FF00"
  warn:         "0xFFFF00"
  error:        "0xFF0000"
  border:       "0xFFFFFF"

  font_family:    "Montserrat"
  font_size_xl:   "56"
  font_size_lg:   "32"
  font_size_md:   "22"
  font_size_sm:   "18"
  font_size_icon: "28"

  radius_sm:    "0"
  radius_md:    "0"
  radius_lg:    "0"
  radius_pill:  "999"
  pad_sm:       "8"
  pad_md:       "12"
  pad_lg:       "20"
  border_w:     "3"

  gradient_a:   "0xFFFF00"
  gradient_b:   "0xFFFFFF"
  shadow_color: "0x000000"
  shadow_op:    "0"
  anim_time:    "100"
