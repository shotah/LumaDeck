# ---------------------------------------------------------------
# widget: analog_clock
# version: 0.2.0
# reads:        ${bg_alt} ${fg} ${accent} ${border} ${border_w}
# targets:      home_page
# exposes:      lum_analog_face lum_analog_hour lum_analog_min lum_analog_sec
# ha_entities:  ha_time
# ha_services:  none
# config:       ${analog_size:-220} ${analog_show_seconds:-true}
#
# Hands are vertical rectangles anchored at face center via
# `align: BOTTOM_MID` and rotated each second around their bottom
# edge using `transform_angle` (LVGL uses 0.1-degree units, so a
# value of 900 = 90 degrees).
# ---------------------------------------------------------------

substitutions:
  analog_size:          "220"
  analog_show_seconds:  "true"

  # Hand lengths (px). Tweak in a consumer device YAML to taste.
  analog_hour_len:      "50"
  analog_min_len:       "70"
  analog_sec_len:       "80"

lvgl:
  pages:
    - id: !extend home_page
      widgets:
        - obj:
            id: lum_analog_face
            align: CENTER
            width: ${analog_size}
            height: ${analog_size}
            radius: ${radius_pill}
            bg_color: ${bg_alt}
            border_color: ${border}
            border_width: ${border_w}
            pad_all: 0
            widgets:
              # Hour hand. Anchored bottom-center at the face center
              # so the bottom edge IS the rotation pivot.
              - obj:
                  id: lum_analog_hour
                  align: CENTER
                  y: -${analog_hour_len}
                  width: 6
                  height: ${analog_hour_len}
                  bg_color: ${fg}
                  bg_opa: COVER
                  border_width: 0
                  radius: 3
                  transform_pivot_x: 3
                  transform_pivot_y: ${analog_hour_len}
              - obj:
                  id: lum_analog_min
                  align: CENTER
                  y: -${analog_min_len}
                  width: 4
                  height: ${analog_min_len}
                  bg_color: ${fg}
                  bg_opa: COVER
                  border_width: 0
                  radius: 2
                  transform_pivot_x: 2
                  transform_pivot_y: ${analog_min_len}
              - obj:
                  id: lum_analog_sec
                  align: CENTER
                  y: -${analog_sec_len}
                  width: 2
                  height: ${analog_sec_len}
                  bg_color: ${accent}
                  bg_opa: COVER
                  border_width: 0
                  transform_pivot_x: 1
                  transform_pivot_y: ${analog_sec_len}
              # Center hub.
              - obj:
                  align: CENTER
                  width: 10
                  height: 10
                  radius: ${radius_pill}
                  bg_color: ${accent}
                  border_width: 0

interval:
  - interval: 1s
    then:
      # All angles are in 0.1-degree units (LVGL convention).
      - lvgl.widget.update:
          id: lum_analog_hour
          transform_angle: !lambda |-
            auto t = id(ha_time).now();
            int h = t.hour % 12;
            return h * 300 + t.minute * 5;
      - lvgl.widget.update:
          id: lum_analog_min
          transform_angle: !lambda |-
            auto t = id(ha_time).now();
            return t.minute * 60 + t.second;
      - if:
          condition:
            lambda: 'return std::string("${analog_show_seconds}") == "true";'
          then:
            - lvgl.widget.update:
                id: lum_analog_sec
                transform_angle: !lambda |-
                  return id(ha_time).now().second * 60;
