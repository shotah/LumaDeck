# ---------------------------------------------------------------
# widget: media_card
# version: 0.2.0
# reads:        ${bg_alt} ${bg} ${fg} ${fg_muted} ${accent} ${success}
#               ${border} ${border_w} ${radius_lg} ${radius_md}
#               ${font_md} ${font_sm} ${pad_md}
# targets:      media_page
# exposes:      lum_media_root lum_media_title lum_media_artist
#               lum_media_btn_prev lum_media_btn_play lum_media_btn_next
#               lum_media_btn_mute lum_media_vol
#               lum_media_title_src lum_media_artist_src
#               lum_media_volume_src lum_media_muted_src
# ha_entities:  ${ha_media_player}
# ha_services:  media_player.media_play_pause / media_next_track /
#               media_previous_track / volume_set / volume_mute
# requires:     packages/ha.yaml
# ---------------------------------------------------------------

text_sensor:
  - platform: homeassistant
    id: lum_media_title_src
    entity_id: ${ha_media_player}
    attribute: media_title
    on_value:
      - lvgl.label.update:
          id: lum_media_title
          text: !lambda 'return x.c_str();'

  - platform: homeassistant
    id: lum_media_artist_src
    entity_id: ${ha_media_player}
    attribute: media_artist
    on_value:
      - lvgl.label.update:
          id: lum_media_artist
          text: !lambda 'return x.c_str();'

sensor:
  - platform: homeassistant
    id: lum_media_volume_src
    entity_id: ${ha_media_player}
    attribute: volume_level
    on_value:
      - lvgl.slider.update:
          id: lum_media_vol
          value: !lambda 'return (int)(x * 100);'

binary_sensor:
  - platform: homeassistant
    id: lum_media_muted_src
    entity_id: ${ha_media_player}
    attribute: is_volume_muted
    on_state:
      - if:
          condition:
            lambda: 'return x;'
          then:
            - lvgl.widget.update:
                id: lum_media_btn_mute
                bg_color: ${accent}
          else:
            - lvgl.widget.update:
                id: lum_media_btn_mute
                bg_color: ${bg}

lvgl:
  pages:
    - id: !extend media_page
      widgets:
        - obj:
            id: lum_media_root
            align: CENTER
            width: 280
            height: 250
            bg_color: ${bg_alt}
            border_color: ${border}
            border_width: ${border_w}
            radius: ${radius_lg}
            pad_all: ${pad_md}
            layout:
              type: FLEX
              flex_flow: COLUMN
              flex_align_main: SPACE_BETWEEN
              flex_align_cross: CENTER
            widgets:
              - label:
                  id: lum_media_title
                  text_color: ${fg}
                  text_font: font_md
                  text: "Nothing playing"
                  long_mode: SCROLL_CIRCULAR
                  width: 240
              - label:
                  id: lum_media_artist
                  text_color: ${fg_muted}
                  text_font: font_sm
                  text: ""
              # Transport controls.
              - obj:
                  width: 240
                  height: 56
                  bg_opa: TRANSP
                  border_width: 0
                  layout:
                    type: FLEX
                    flex_flow: ROW
                    flex_align_main: SPACE_EVENLY
                    flex_align_cross: CENTER
                  widgets:
                    - button:
                        id: lum_media_btn_prev
                        width: 64
                        height: 44
                        bg_color: ${bg}
                        radius: ${radius_md}
                        on_click:
                          - script.execute: ha_media_prev
                        widgets:
                          - label:
                              align: CENTER
                              text_color: ${fg}
                              text_font: font_md
                              text: "<<"
                    - button:
                        id: lum_media_btn_play
                        width: 72
                        height: 44
                        bg_color: ${accent}
                        radius: ${radius_md}
                        on_click:
                          - script.execute: ha_media_play_pause
                        widgets:
                          - label:
                              align: CENTER
                              text_color: ${bg}
                              text_font: font_md
                              text: "play"
                    - button:
                        id: lum_media_btn_next
                        width: 64
                        height: 44
                        bg_color: ${bg}
                        radius: ${radius_md}
                        on_click:
                          - script.execute: ha_media_next
                        widgets:
                          - label:
                              align: CENTER
                              text_color: ${fg}
                              text_font: font_md
                              text: ">>"
              # Volume row: mute toggle + horizontal slider.
              - obj:
                  width: 240
                  height: 36
                  bg_opa: TRANSP
                  border_width: 0
                  layout:
                    type: FLEX
                    flex_flow: ROW
                    flex_align_main: SPACE_BETWEEN
                    flex_align_cross: CENTER
                  widgets:
                    - button:
                        id: lum_media_btn_mute
                        width: 44
                        height: 32
                        bg_color: ${bg}
                        radius: ${radius_md}
                        on_click:
                          - homeassistant.service:
                              service: media_player.volume_mute
                              data:
                                entity_id: ${ha_media_player}
                              data_template:
                                is_volume_muted: !lambda |-
                                  return id(lum_media_muted_src).state ? "false" : "true";
                        widgets:
                          - label:
                              align: CENTER
                              text_color: ${fg}
                              text_font: font_sm
                              text: "M"
                    - slider:
                        id: lum_media_vol
                        width: 180
                        height: 16
                        min_value: 0
                        max_value: 100
                        value: 50
                        indicator:
                          bg_color: ${accent}
                        knob:
                          bg_color: ${accent}
                          radius: ${radius_pill}
                          pad_all: 4
                        on_value:
                          - homeassistant.service:
                              service: media_player.volume_set
                              data:
                                entity_id: ${ha_media_player}
                              data_template:
                                volume_level: !lambda |-
                                  char buf[8];
                                  snprintf(buf, sizeof(buf), "%.2f", x / 100.0f);
                                  return std::string(buf);
