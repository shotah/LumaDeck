# ---------------------------------------------------------------
# widget: notification_sound
# version: 0.1.0
# reads:        nothing visual
# targets:      no LVGL — pure script trigger
# exposes:      lum_notify_chime
# ha_entities:  none
# ha_services:  none
# requires:     packages/audio.yaml (provides `speaker: lum_speaker`)
# config:       ${notify_freq_hz:-880} ${notify_duration_ms:-120}
#               ${notify_amplitude:-8000}
#
# A tiny script-only widget. Calling `script.execute: lum_notify_chime`
# generates a short sine-wave chime at runtime and plays it through
# `lum_speaker`. Pair with `notification_toast` for a sound-and-toast
# notification:
#
#     - script.execute: lum_toast_show
#       msg: "Doorbell"
#     - script.execute: lum_notify_chime
#
# Tweak frequency / duration per device. Amplitude defaults to ~25 %
# of int16 full scale to leave headroom and keep cheap PCM5101 amps
# from clipping.
# ---------------------------------------------------------------

script:
  - id: lum_notify_chime
    then:
      # Build a one-shot int16 PCM buffer (LE) at 16 kHz and hand it
      # to the speaker. The buffer is small (~4 KB at defaults) so
      # the heap allocation is fine.
      - lambda: |-
          const int   sample_rate = 16000;
          const int   duration_ms = ${notify_duration_ms | default(120)};
          const float freq_hz     = ${notify_freq_hz | default(880)};
          const int   amplitude   = ${notify_amplitude | default(8000)};
          const int   n_samples   = (sample_rate * duration_ms) / 1000;

          std::vector<uint8_t> buf;
          buf.reserve(n_samples * 2);
          for (int i = 0; i < n_samples; i++) {
            float t = (float)i / (float)sample_rate;
            int16_t s = (int16_t)(amplitude * sinf(2.0f * 3.14159265f * freq_hz * t));
            buf.push_back(s & 0xFF);
            buf.push_back((s >> 8) & 0xFF);
          }
          id(lum_speaker).play(buf.data(), buf.size());
