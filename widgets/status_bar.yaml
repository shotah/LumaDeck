# ---------------------------------------------------------------
# widget: status_bar
# version: 0.4.0
# reads:        ${bg} ${fg} ${fg_muted} ${success} ${error}
#               ${font_sm} ${font_icon}
# targets:      home_page
# exposes:      lum_status_root lum_status_wifi lum_status_api lum_status_time
# ha_entities:  ha_time
# ha_services:  none
# requires:     packages/fonts.yaml
# config:       ${status_w:-220} ${status_h:-24}
#
# Wifi / API indicators render Material Symbols icon glyphs from
# `font_icon`. Sizes use inline `${var | default(N)}` syntax so any
# layout (or the device YAML's top-level substitutions block) can
# override them regardless of include order.
# ---------------------------------------------------------------

lvgl:
  pages:
    - id: !extend home_page
      widgets:
        - obj:
            id: lum_status_root
            align_to:
              id: region_top
              align: CENTER
              x: 0
              y: 0
            width: ${status_w | default(220)}
            height: ${status_h | default(24)}
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: SPACE_BETWEEN
              flex_align_cross: CENTER
            widgets:
              - label:
                  id: lum_status_wifi
                  text_color: ${success}
                  text_font: font_icon
                  text: "\uE63E"   # wifi
              - label:
                  id: lum_status_time
                  text_color: ${fg}
                  text_font: font_sm
                  text: "--:--"
              - label:
                  id: lum_status_api
                  text_color: ${success}
                  text_font: font_icon
                  text: "\uE2BF"   # cloud_done

interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: lum_status_time
          text: !lambda |-
            return id(ha_time).now().strftime("%H:%M").c_str();
